services:
  app:
    build: .
    container_name: laravel-app
    init: true
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - .:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - laravel

  queue:
    build: .
    container_name: laravel-queue
    init: true
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    command: [ "php", "artisan", "queue:work", "--tries=1", "--timeout=120", "--sleep=1", "--verbose" ]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - laravel

  reverb:
    build: .
    container_name: laravel-reverb
    init: true
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    command: [ "php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--debug" ]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: nginx
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - reverb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - laravel

networks:
  laravel:
    driver: bridge
